- year: "1915"
  title: "The Field Equations"
  description: "Albert Einstein presents the field equations of General Relativity to the Prussian Academy of Sciences, fundamentally reshaping our understanding of gravity as the curvature of spacetime."

- year: "1916"
  title: "The Schwarzschild Solution"
  description: "Karl Schwarzschild publishes the first exact solution to the Einstein field equations, laying the mathematical foundation for the concept of black holes."

- year: "1919"
  title: "Solar Eclipse Confirmation"
  description: "Arthur Eddington's expedition measures the deflection of starlight during a solar eclipse, providing the first dramatic observational proof of General Relativity."

- year: "1921"
  title: "Kaluza-Klein Theory"
  description: "Theodor Kaluza and Oskar Klein propose a five-dimensional extension of General Relativity in an early attempt to unify gravity with electromagnetism."

- year: "1939"
  title: "Gravitational Collapse"
  description: "J. Robert Oppenheimer and Hartland Snyder publish the first theoretical model showing how a massive star can collapse under its own gravity to form a black hole."

- year: "1961"
  title: "Brans-Dicke Theory"
  description: "Carl H. Brans and Robert H. Dicke develop a scalar-tensor theory of gravitation, introducing a scalar field alongside the metric tensor as a competitive alternative to standard GR."

- year: "1963"
  title: "The Kerr Metric"
  description: "Roy Kerr discovers the exact solution for a rotating black hole, which is now believed to represent the vast majority of black holes in the universe."

- year: "1974"
  title: "The Binary Pulsar"
  description: "Russell Hulse and Joseph Taylor discover the first binary pulsar (PSR B1913+16). Its orbital decay provided the first indirect evidence of gravitational waves."

- year: "1976"
  title: "Supergravity (SUGRA)"
  description: "Daniel Freedman, Peter van Nieuwenhuizen, and Sergio Ferrara formulate Supergravity, combining the principles of supersymmetry with general relativity."

- year: "1998"
  title: "The Accelerating Universe"
  description: "Observations of distant supernovae reveal that the expansion of the universe is accelerating, leading to the widespread acceptance of Dark Energy."

- year: "2015"
  title: "Direct Detection of Gravitational Waves"
  description: "The LIGO observatories make the first direct observation of gravitational waves (GW150914), generated by the merger of two black holes 1.3 billion light-years away."

- year: "2019"
  title: "Imaging a Black Hole"
  description: "The Event Horizon Telescope (EHT) collaboration releases the first direct image of a black hole's shadow at the center of the galaxy M87."
