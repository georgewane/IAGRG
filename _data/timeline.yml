- period: "1915 — 1960"
  id: "era-1"
  events:
    - year: "1915"
      title: "The Field Equations"
      description: "Albert Einstein presents the field equations of General Relativity, fundamentally reshaping our understanding of gravity as the curvature of spacetime."

    - year: "1916"
      title: "The Schwarzschild Solution"
      description: "Karl Schwarzschild publishes the first exact solution to the Einstein field equations, laying the mathematical foundation for black holes."

    - year: "1919"
      title: "Solar Eclipse Confirmation"
      description: "Arthur Eddington's expedition measures the deflection of starlight, providing the first dramatic observational proof of General Relativity."

    - year: "1921"
      title: "Kaluza-Klein Theory"
      description: "Theodor Kaluza and Oskar Klein propose a five-dimensional extension of General Relativity to unify gravity with electromagnetism."

    - year: "1922"
      title: "Expanding Universe"
      description: "Alexander Friedmann derives the Friedmann equations from Einstein's field equations, showing that the universe might be expanding."

    - year: "1939"
      title: "Gravitational Collapse"
      description: "J. Robert Oppenheimer and Hartland Snyder publish the first theoretical model showing how a massive star collapses to form a black hole."

- period: "1961 — 2000"
  id: "era-2"
  events:
    - year: "1961"
      title: "Brans-Dicke Theory"
      description: "Carl H. Brans and Robert H. Dicke develop a scalar-tensor theory of gravitation as a competitive alternative to standard GR."

    - year: "1963"
      title: "The Kerr Metric"
      description: "Roy Kerr discovers the exact solution for a rotating black hole, which is now believed to represent the vast majority of black holes in the universe."

    - year: "1965"
      title: "Singularity Theorems"
      description: "Roger Penrose proves that singularities are a generic and inevitable feature of gravitational collapse."

    - year: "1974"
      title: "Hawking Radiation"
      description: "Stephen Hawking mathematically predicts that black holes are not completely black, but emit black-body radiation due to quantum effects."

    - year: "1974"
      title: "The Binary Pulsar"
      description: "Russell Hulse and Joseph Taylor discover the first binary pulsar. Its orbital decay provides the first indirect evidence of gravitational waves."

    - year: "1976"
      title: "Supergravity (SUGRA)"
      description: "Daniel Freedman, Peter van Nieuwenhuizen, and Sergio Ferrara formulate Supergravity, combining supersymmetry with general relativity."

    - year: "1998"
      title: "Accelerating Universe"
      description: "Observations of distant supernovae reveal that the expansion of the universe is accelerating, leading to the widespread acceptance of Dark Energy."

- period: "2001 — 2026"
  id: "era-3"
  events:
    - year: "2004"
      title: "Gravity Probe B"
      description: "NASA launches Gravity Probe B, which successfully measures the geodetic effect and frame-dragging predicted by General Relativity."

    - year: "2015"
      title: "GW150914: First Direct Detection"
      description: "The LIGO observatories make the first direct observation of gravitational waves, generated by the merger of two black holes."

    - year: "2017"
      title: "GW170817: Multi-Messenger Era"
      description: "LIGO and Virgo detect a neutron star merger, while telescopes simultaneously observe the electromagnetic counterpart."

    - year: "2019"
      title: "Imaging a Black Hole"
      description: "The Event Horizon Telescope (EHT) collaboration releases the first direct image of a black hole's shadow at the center of the galaxy M87."

    - year: "2023"
      title: "Stochastic Gravitational Wave Background"
      description: "Pulsar Timing Array collaborations worldwide announce the first evidence of a low-frequency gravitational wave background, likely from supermassive black hole binaries."
