- year: 2020
  winner: "Sumanta Chakraborty"
  affiliation: "Indian Association for the Cultivation of Science, Kolkata"
  citation: "For prolific contributions to multifaceted aspects of classical and quantum gravity, in particular for testing predictions of alternative theories of gravity from gravitational wave observations."

- year: 2019
  winner: "P. Ajith"
  affiliation: "International Center for Theoretical Sciences, Bengaluru"
  citation: "For his pioneering contributions to research on gravitational waves, by building waveform templates for non-precessing spinning binary systems and for developing tests of General Relativity from the consistency of the observed waveform produced during inspiral-merger-ringdown of black hole binaries."

- year: 2017
  winner: "K. G. Arun"
  affiliation: "Chennai Mathematical Institute, Chennai"
  citation: "For playing a key role in obtaining waveforms of gravitational radiation ensuing from coalescing compact binary systems, incorporating higher order post-Newtonian corrections, and his significant contribution in devising a novel test of General Relativity and alternative theories using gravitational waves."

- year: 2015
  winner: "Archana Pai"
  affiliation: "IISER Thiruvananthapuram, Thiruvananthapuram"
  citation: "For important and timely contributions towards ground and space based detection of gravitational waves and for building up an IndIGO subgroup at IISER Thiruvananthapuram."

- year: 2015
  winner: "Sandipan Sengupta"
  affiliation: "IUCAA, Pune"
  citation: "For elucidation of the extraordinary role of the Nieh-Yan topological density in the canonical formulation of classical gravity as well as in the quantum theory."
